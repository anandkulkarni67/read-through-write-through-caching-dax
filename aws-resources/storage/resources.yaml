AWSTemplateFormatVersion: '2010-09-09'
Description: AWS SAM template for storage resources for a serverless API

Parameters:
  ApplicationName:
    Type: String
    Default: 'serverless-api'

Resources:

  CustomerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions: 
        - AttributeName: CustomerId
          AttributeType: S
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: CustomerId
          KeyType: HASH
      TableName: !Sub '${ApplicationName}-customer-table'
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

Outputs:
  DynamoDB:
    Description: 'DynamoDB table name'
    Export:
      Name: !Join [ '-', [ !Ref ApplicationName, 'customer-table']]
    Value: !Ref CustomerTable